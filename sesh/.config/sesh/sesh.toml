# Sesh configuration
# https://github.com/joshmedeski/sesh

# Strict mode catches typos and invalid config options
strict_mode = true

# Show last 2 path components (e.g., "ai/serena")
dir_length = 2

# Exclude sessions by name (regex patterns matched against session names, not paths)
blacklist = [
  "node_modules", "^target$", "\\.git", "^vendor$", "^dist$",
  "\\.cache", "__pycache__", "\\.venv", "^venv$", "\\.direnv", "^build$",
  "^coverage$", "\\.next", "\\.nuxt", "^out$",
  "^pi [0-9a-f]+"
]

# Sort order for session list
sort_order = ["config", "tmux", "zoxide"]

# Default session settings
[default_session]
startup_command = "[ -f README.md ] && nvim README.md || yazi"
preview_command = "eza --all --git --icons --color=always {}"
