# ~/.config/yazi/yazi.toml
# Wayland/Sway-focused baseline

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5
title_format = "Yazi: {cwd}"

[preview]
wrap = "no"
tab_size = 2
max_width = 1400
max_height = 1400
image_delay = 30
image_filter = "lanczos3"
image_quality = 75

[plugin]
prepend_previewers = [
	{ url = "*.tar", run = "ouch" },
	{ url = "*.tar.*", run = "ouch" },
	{ url = "*.tgz", run = "ouch" },
	{ url = "*.tbz2", run = "ouch" },
	{ url = "*.txz", run = "ouch" },
	{ url = "*.xz", run = "ouch" },
	{ url = "*.gz", run = "ouch" },
	{ url = "*.bz2", run = "ouch" },
	{ url = "*.zst", run = "ouch" },
	{ url = "*.zip", run = "ouch" },
	{ url = "*.7z", run = "ouch" },
	{ url = "*.rar", run = "ouch" },
]

[opener]
edit = [
	{ run = '${EDITOR:-nvim} %s', block = true, for = "unix" },
]
open = [
	{ run = 'xdg-open %s1', orphan = true, desc = "Open", for = "linux" },
]
play = [
	{ run = 'mpv %s', orphan = true, desc = "Play", for = "linux" },
]

[open]
prepend_rules = [
	{ mime = "text/*", use = "edit" },
	{ mime = "video/*", use = "play" },
	{ mime = "audio/*", use = "play" },
	{ mime = "image/*", use = "open" },
	{ mime = "application/pdf", use = "open" },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
suppress_preload = false
