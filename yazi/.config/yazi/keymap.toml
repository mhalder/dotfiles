# ~/.config/yazi/keymap.toml
# Wayland/Sway custom bindings. Defaults remain active.

[[mgr.prepend_keymap]]
on = ["g", "."]
run = "cd ~/.config/dotfiles"
desc = "Go to dotfiles"

[[mgr.prepend_keymap]]
on = ["g", "r"]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "Go to git root"

[[mgr.prepend_keymap]]
on = "!"
run = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on = "y"
run = [
  'shell -- for path in %s; do echo "file://$path"; done | wl-copy -t text/uri-list',
  "yank"
]
desc = "Yank + copy file URIs to Wayland clipboard"

[[mgr.prepend_keymap]]
on = "Y"
run = 'shell -- for path in %s; do echo "$path"; done | sed "s|^$HOME|~|" | wl-copy'
desc = "Copy selected paths to Wayland clipboard"

[[mgr.prepend_keymap]]
on = ["g", "s"]
run = "cd ~/.config/sway"
desc = "Go to sway config"
